defaults:
  - model/student: student
  - model/expert: expert
  - training: lora
  - experiment: default
  - _self_

# ── General ──
project_name: afdad
mode: train
seed: 42
output_dir: ./outputs
data_dir: ./data

# ── Execution ──
execution:
  timeout_seconds: 30
  temp_dir: ${output_dir}/exec_tmp
  max_concurrent_evals: 8

# ── Failure Memory ──
failure_memory:
  db_path: ${output_dir}/failure_memory.db
  embedding_model: BAAI/bge-large-en-v1.5
  embedding_dim: 1024
  embedding_batch_size: 32
  similarity_top_k: 5
  text_truncation:
    task: 200
    traceback: 500
    stderr: 300
    code: 300

# ── Failure Clustering ──
clustering:
  n_clusters: 6
  cluster_names:
    - Syntax
    - Runtime
    - Logic
    - EdgeCases
    - AlgorithmDesign
    - Efficiency
  centroids_path: ${output_dir}/centroids.npy
  min_samples_for_fit: 20
  ema_decay: 0.1
  seed: ${seed}

# ── Trajectories ──
trajectories:
  buffer_capacity: 10000
  save_dir: ${output_dir}/trajectories
  curriculum_amplification: 5.0


# ── Distillation ──
distillation:
  dataset_dir: ${output_dir}/distillation_dataset
  max_seq_length: 4096

# ── Evaluation ──
evaluation:
  benchmarks:
    - humaneval
    - mbpp
  num_samples_per_task: 5
  temperature: 0.8

# ── Pipeline ──
pipeline:
  max_repair_attempts: 3
  max_tasks_per_round: 164
  num_training_rounds: 5

# ── Logging ──
logging:
  use_wandb: true
  wandb_project: afdad
  wandb_entity: null
  log_level: INFO
