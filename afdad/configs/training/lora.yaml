# QLoRA Training Configuration
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  bias: none
  task_type: CAUSAL_LM

# Quantization
quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

# Training
training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_grad_norm: 0.3
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  eval_steps: 50
  output_dir: ${output_dir}/checkpoints
  report_to: wandb

# Data
data:
  max_seq_length: 4096
  packing: false
